spring.application.name=qually

# Active profile is controlled by the SPRING_PROFILES_ACTIVE environment variable.
# Falls back to 'dev' when not set.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA shared settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# JWT ? still used to issue the access_token cookie after OAuth2 login
app.jwt.secret=${JWT_SECRET:qually-local-dev-secret-key-minimum-32-chars}

# ?? Microsoft Entra ID (Azure AD) OAuth2 ?????????????????????????????????????
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/azure
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=sub

# Frontend URL ? where to redirect after successful OAuth2 login
# Override in production via environment variable
app.frontend.url=${FRONTEND_URL:http://localhost:5173}