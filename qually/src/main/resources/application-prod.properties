# ?? Database ??????????????????????????????????????????????????
# These three variables are set in Render's environment variable dashboard.
# No fallback values here intentionally ? if they're missing, the app
# should fail loudly at startup rather than silently connect to nothing.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ?? JPA ???????????????????????????????????????????????????????
# Never log SQL in production ? it's noisy and can leak sensitive data.
spring.jpa.show-sql=false

# ?? CORS ??????????????????????????????????????????????????????
# Set this in Render's env vars too, so you don't have to redeploy
# just because your Vercel URL changed.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}